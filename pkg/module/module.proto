syntax = "proto3";

package module;

option go_package = "nexus-open/pkg/module";

// ModuleService defines the RPC service for modules
service ModuleService {
  // Describe returns module metadata
  rpc Describe(DescribeRequest) returns (DescribeResponse);

  // Sample returns current data payload
  rpc Sample(SampleRequest) returns (SampleResponse);
}

// DescribeRequest is empty
message DescribeRequest {}

// DescribeResponse contains module metadata
message DescribeResponse {
  string name = 1;
  string version = 2;
  string author = 3;
  string description = 4;
  string icon = 5;
  int32 refresh_ms = 6;
}

// SampleRequest is empty
message SampleRequest {}

// SampleResponse contains the payload data
message SampleResponse {
  string title = 1;
  string primary = 2;
  string secondary = 3;
  repeated float spark = 4;
  string severity = 5;
  int64 ttl_ms = 6;
  string icon = 7;
  float progress = 8;
  int64 timestamp = 9;
}
