app-id: com.github.nexusopen.NexusOpen
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: nexus-open

finish-args:
  # USB device access (iCUE Nexus)
  - --device=all
  # Network access for weather API
  - --share=network
  # Access to config directory
  - --filesystem=xdg-config/nexus-open:create
  # System monitoring access
  - --filesystem=/sys:ro
  - --filesystem=/proc:ro
  # Wayland/X11 support (for tray icon/notifications if added)
  - --socket=wayland
  - --socket=fallback-x11
  # Session bus for desktop integration
  - --socket=session-bus
  # Allow talking to systemd
  - --system-talk-name=org.freedesktop.systemd1

modules:
  - name: libayatana-appindicator
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_BINDINGS_MONO=NO
      - -DENABLE_BINDINGS_VALA=NO
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-appindicator/archive/0.5.93.tar.gz
        sha256: b6e98799f9b54b04d9e59c94f628e2e4c9c8f6f54e6b7621c79aa0ad312c0586
    cleanup:
      - /include
      - /lib/pkgconfig
      - '*.la'

  - name: nexus-open
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/golang/bin
      env:
        GOBIN: /app/bin
        GOROOT: /usr/lib/sdk/golang
        CGO_ENABLED: '1'
    build-commands:
      # Build the Go application
      - |
        . /usr/lib/sdk/golang/enable.sh
        go build -v -o nexus-open \
          -ldflags "-X main.version=1.0.0" \
          ./cmd/nexus-open
      # Install binary
      - install -Dm755 nexus-open /app/bin/nexus-open
      # Install desktop file
      - install -Dm644 packaging/desktop/nexus-open.desktop /app/share/applications/com.github.nexusopen.NexusOpen.desktop
      # Install icon (requires packaging/icons/256.png — build icon set first)
      - |
        if [ -f packaging/icons/256.png ]; then
          install -Dm644 packaging/icons/256.png \
            /app/share/icons/hicolor/256x256/apps/com.github.nexusopen.NexusOpen.png
        fi
      # Install metainfo
      - install -Dm644 packaging/flatpak/com.github.nexusopen.NexusOpen.metainfo.xml /app/share/metainfo/com.github.nexusopen.NexusOpen.metainfo.xml
      # Install udev rules (bundled but user needs to manually install to system)
      - install -Dm644 packaging/udev/99-corsair-nexus.rules /app/share/nexus-open/99-corsair-nexus.rules
    sources:
      - type: git
        url: https://github.com/mantonx/nexus-open.git
        tag: v1.0.0
        # For local testing, use:
        # - type: dir
        #   path: ../..

  # Optional: Include Flutter UI as a separate module if desired
  # - name: nexus-open-ui
