name: open_next
description: Open Next - Linux desktop application
publish_to: 'none'

version: 0.0.0+0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.0.0
  cupertino_icons: ^1.0.2
  flutter_colorpicker: ^1.1.0  # Downgraded from ^3.0.0
  provider: ^6.0.5
  intl: ^0.18.1
  xdg_directories: ^1.0.0
  path_provider_linux: ^2.2.1
  path: ^1.8.3
  file: ^7.0.0
  shared_preferences: ^2.2.0
  flutter_map: ^5.0.0
  latlong2: ^0.9.0
  url_launcher: ^6.1.12
  geocoding: ^2.1.0
  http: ^1.1.0  # For city search API
  flutter_typeahead: ^4.6.2
  weather_icons: ^3.0.0
  file_picker: ^6.0.0  # For image upload
  window_manager: ^0.5.1
  web_socket_channel: ^3.0.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  freezed: ^2.5.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  widgetbook: ^3.23.0
  widgetbook_annotation: ^3.11.0
  widgetbook_generator: ^3.14.0

flutter:
  uses-material-design: true
  assets:
    - ../testdata/payloads/

