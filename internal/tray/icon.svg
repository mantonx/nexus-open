<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e"/>
  
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  
  <!-- Screen/display body -->
  <rect x="12" y="18" width="40" height="26" rx="3" ry="3" fill="#0f3460" stroke="#00d4ff" stroke-width="1.5"/>
  
  <!-- Screen content — three data bars suggesting monitoring -->
  <rect x="17" y="24" width="18" height="3" rx="1" fill="#00d4ff" opacity="0.9"/>
  <rect x="17" y="30" width="26" height="3" rx="1" fill="#00d4ff" opacity="0.6"/>
  <rect x="17" y="36" width="12" height="3" rx="1" fill="#00d4ff" opacity="0.4"/>
  
  <!-- Pulse dot (top right of screen) -->
  <circle cx="45" cy="25" r="3" fill="#00ff88"/>
  
  <!-- Stand -->
  <rect x="28" y="44" width="8" height="5" rx="1" fill="#0f3460" stroke="#00d4ff" stroke-width="1"/>
  <rect x="23" y="48" width="18" height="2.5" rx="1" fill="#00d4ff" opacity="0.7"/>
</svg>
