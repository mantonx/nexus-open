name: "Per-Module Config Test"
version: "1.0"

# Global theme
theme:
  bg: "#101010"
  fg: "#EAEAEA"
  muted: "#9AA0A6"
  accent: "#00C8FF"
  gutter_px: 2
  font_size_primary: 14
  font_size_secondary: 10

# Pages (swipeable)
pages:
  - name: "Main"
    zones:
      - id: weather
        width: 160
        plugin: exec:plugins/weather/weather
        refresh_ms: 300000
        align: left
        plugin_config:
          location: "New York, NY"
          unit: "imperial"

      - id: cpu
        width: 160
        plugin: exec:plugins/cpu-temp/cpu-temp
        refresh_ms: 2000
        align: center
        plugin_config:
          unit: "metric"  # Celsius

      - id: gpu
        width: 160
        plugin: exec:plugins/gpu-temp/gpu-temp
        refresh_ms: 2000
        align: center
        theme_override:
          accent: "#FF6B6B"
        plugin_config:
          unit: "imperial"  # Fahrenheit

      - id: clock
        width: 160
        plugin: builtin:clock
        refresh_ms: 1000
        align: right

# Navigation
navigation:
  swipe_enabled: true
  auto_rotate: false
  auto_rotate_interval_s: 10
