name: "Default Dashboard"
version: "1.0"

# Global theme
theme:
  bg: "#000000"
  fg: "#EAEAEA"
  muted: "#B8BDC2"
  accent: "#00C8FF"
  gutter_px: 2
  font_size_primary: 24
  font_size_secondary: 9

# Pages (swipeable)
pages:
  - name: "Main"
    zones:
      - id: weather
        width: 160
        plugin: builtin:placeholder
        refresh_ms: 5000
        align: left
        theme_override:
          accent: "#C87820"

      - id: cpu
        width: 160
        plugin: builtin:placeholder
        refresh_ms: 2000
        align: left
        theme_override:
          accent: "#38C878"

      - id: gpu
        width: 160
        plugin: builtin:placeholder
        refresh_ms: 2000
        align: left
        theme_override:
          accent: "#FF6B35"

      - id: clock
        width: 160
        plugin: builtin:placeholder
        refresh_ms: 1000
        align: center

  - name: "Media"
    zones:
      - id: media
        width: 320
        plugin: builtin:placeholder
        refresh_ms: 1000
        align: left

      - id: network
        width: 160
        plugin: builtin:placeholder
        refresh_ms: 2000
        align: center

      - id: clock
        width: 160
        plugin: builtin:placeholder
        refresh_ms: 1000
        align: right

# Navigation
navigation:
  swipe_enabled: true
  auto_rotate: false
  auto_rotate_interval_s: 10
