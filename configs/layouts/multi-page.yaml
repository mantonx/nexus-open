# Multi-Page Layout Example
# Demonstrates swipeable pages with different zone configurations

name: "Multi-Page Dashboard"
version: "1.0"

# Global theme
theme:
  bg: "#000000"
  fg: "#EAEAEA"
  muted: "#B8BDC2"
  accent: "#00C8FF"
  gutter_px: 2
  font_size_primary: 24
  font_size_secondary: 9

# Navigation settings
navigation:
  swipe_enabled: true
  auto_rotate: false
  auto_rotate_interval_s: 10

# Pages (swipeable layouts)
pages:
  # Page 1: System Monitoring
  - name: "System"
    zones:
      - id: system.weather
        width: 160
        plugin: exec:nexus-weather
        refresh_ms: 300000  # 5 minutes
        align: left
        theme_override:
          accent: "#C87820"

      - id: system.cpu
        width: 160
        plugin: exec:nexus-cpu-temp
        refresh_ms: 2000
        align: left
        theme_override:
          accent: "#38C878"

      - id: system.gpu
        width: 160
        plugin: exec:nexus-gpu-temp
        refresh_ms: 2000
        align: left
        theme_override:
          accent: "#FF6B35"

      - id: system.network
        width: 160
        plugin: exec:nexus-network
        refresh_ms: 2000
        align: left
        theme_override:
          accent: "#00C8FF"

  # Page 2: Performance Focus
  - name: "Performance"
    zones:
      - id: performance.cpu
        width: 240
        plugin: exec:nexus-cpu-temp
        refresh_ms: 1000
        align: center
        theme_override:
          accent: "#00FF88"

      - id: performance.gpu
        width: 240
        plugin: exec:nexus-gpu-temp
        refresh_ms: 1000
        align: center
        theme_override:
          accent: "#FF6B6B"

      - id: performance.network
        width: 160
        plugin: exec:nexus-network
        refresh_ms: 1000
        align: right

  # Page 3: Load Monitoring
  - name: "Load"
    zones:
      - id: load.cpu
        width: 160
        plugin: exec:nexus-cpu-load
        refresh_ms: 1000
        align: left
        theme_override:
          accent: "#38C878"
        plugin_config:
          source: "all"
          graph_type: sparkline

      - id: load.cpu-hybrid
        width: 160
        plugin: exec:nexus-cpu-load
        refresh_ms: 1000
        align: left
        theme_override:
          accent: "#38C878"
        plugin_config:
          source: ["p-cores", "e-cores"]
          graph_type: sparkline

      - id: load.gpu
        width: 160
        plugin: exec:nexus-gpu-load
        refresh_ms: 1000
        align: left
        theme_override:
          accent: "#FF6B35"
        plugin_config:
          source: gpu
          graph_type: sparkline
          show_vram: true

      - id: load.gpu-mem
        width: 160
        plugin: exec:nexus-gpu-load
        refresh_ms: 1000
        align: left
        theme_override:
          accent: "#FF6B35"
        plugin_config:
          source: memory
          graph_type: sparkline
          show_vram: false

  # Page 4: Minimal Clock
  - name: "Clock"
    zones:
      - id: clock.time
        width: 640
        plugin: builtin:clock
        refresh_ms: 1000
        align: center
        theme_override:
          font_size_primary: 20
          accent: "#FFD700"
