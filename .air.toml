root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/nexus-open"
  cmd = "go build -o ./tmp/nexus-open ./cmd/nexus-open"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "ui", "build", "bin", "docs", "packaging", "scripts"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "NEXUS_DEBUG=1 ./tmp/nexus-open --debug"
  include_dir = ["cmd", "internal", "pkg", "plugins"]
  include_ext = ["go"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  # Plugins are built directly into the installed location so the daemon
  # picks them up immediately on restart without a separate copy step.
  pre_cmd = [
    "cd plugins/cpu-temp && go build -o ~/.local/share/nexus-open/plugins/cpu-temp  .",
    "cd plugins/cpu-load && go build -o ~/.local/share/nexus-open/plugins/cpu-load  .",
    "cd plugins/gpu-temp && go build -o ~/.local/share/nexus-open/plugins/gpu-temp  .",
    "cd plugins/gpu-load && go build -o ~/.local/share/nexus-open/plugins/gpu-load  .",
    "cd plugins/network  && go build -o ~/.local/share/nexus-open/plugins/network   .",
    "cd plugins/weather  && go build -o ~/.local/share/nexus-open/plugins/weather   .",
  ]
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
