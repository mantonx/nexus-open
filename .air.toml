root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/nexus-open"
  cmd = "bash scripts/build-changed-plugins.sh && bash scripts/build-daemon.sh"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "ui", "build", "bin", "docs", "packaging", "scripts"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "NEXUS_DEBUG=1 NEXUS_PLUGINS_DIR=./tmp/plugins ./tmp/nexus-open --debug"
  include_dir = ["cmd", "internal", "pkg", "plugins"]
  include_ext = ["go"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  # Only rebuild plugins whose source is newer than their binary (mtime check).
  # Builds to ./tmp/plugins/<name>/<name> via atomic rename — the running daemon
  # never sees a partial binary. NEXUS_PLUGINS_DIR keeps dev artifacts out of
  # the XDG install path.
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
