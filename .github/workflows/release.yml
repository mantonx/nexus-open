name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-packages:
    name: Build Packages
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Build Flutter UI
        working-directory: ui
        run: flutter build linux --release

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install fpm
        run: |
          gem install fpm --no-document
          echo "$(gem environment gemdir)/bin" >> "$GITHUB_PATH"

      - name: Install RPM tools
        run: sudo apt-get install -y rpm

      - name: Build packages (deb + rpm + pacman)
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^PKG_VERSION=.*/PKG_VERSION=\"${PKG_VERSION}\"/" build-package.sh
          ./build-package.sh --deb --rpm --pacman

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: dist/
          retention-days: 7

  # Verify packages install and run correctly before publishing the release.
  verify-packages:
    name: Verify (${{ matrix.label }})
    runs-on: ubuntu-24.04
    needs: build-packages
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-24.04
            flag: --test-deb
          - label: fedora-40
            flag: --test-rpm
          - label: arch
            flag: --test-pacman
    steps:
      - uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: dist/

      - name: Verify install (${{ matrix.label }})
        run: ./build-package.sh ${{ matrix.flag }}

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-packages, verify-packages]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" \
              CHANGELOG.md > /tmp/release-notes.md
          fi
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${TAG_NAME}" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.zst
            dist/SHA256SUMS
          fail_on_unmatched_files: false
