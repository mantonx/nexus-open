name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binary:
    name: Build Binary
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Build release binary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          CGO_ENABLED=1 go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
            -o nexus-open \
            ./cmd/nexus-open
          strip nexus-open

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-open-binary
          path: nexus-open

  build-deb:
    name: Build DEB
    runs-on: ubuntu-latest
    needs: build-binary
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: nexus-open-binary

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Build DEB
        run: bash scripts/build-deb.sh

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-open-deb
          path: dist/*.deb

  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    needs: build-binary
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: nexus-open-binary

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Build AppImage
        run: bash scripts/build-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-open-appimage
          path: dist/*.AppImage

  build-rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    needs: build-binary
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM tools
        run: sudo apt-get install -y rpm build-essential libusb-1.0-0-dev libudev-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build RPM
        run: bash scripts/build-rpm.sh

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-open-rpm
          path: dist/*.rpm

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-deb, build-appimage, build-rpm]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          # Extract the section for this version from CHANGELOG.md if it exists
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" \
              CHANGELOG.md > /tmp/release-notes.md
          fi
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Release ${TAG_NAME}" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            dist/*.deb
            dist/*.AppImage
            dist/*.rpm
            dist/SHA256SUMS
          fail_on_unmatched_files: false
