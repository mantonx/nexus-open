name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

jobs:
  # ── Build Go binary + Flutter UI, produce all three package formats ──────────
  build:
    name: Build Packages
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          VERSION=$(git describe --tags --match 'v*' --always 2>/dev/null | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release v$VERSION"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-ubuntu-24.04-${{ hashFiles('ui/pubspec.lock') }}
          restore-keys: pub-ubuntu-24.04-

      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu-24.04-flutter-build-v1
          restore-keys: apt-ubuntu-24.04-flutter-build-

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            rpm libarchive-tools

      - name: Cache build_runner output
        uses: actions/cache@v5
        with:
          path: ui/.dart_tool/build
          key: build-runner-ubuntu-24.04-${{ hashFiles('ui/pubspec.lock', 'ui/lib/**/*.dart') }}
          restore-keys: build-runner-ubuntu-24.04-

      - name: Generate code (freezed / json_serializable)
        working-directory: ui
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Flutter UI
        run: |
          cd ui && flutter build linux --release \
            --dart-define=APP_VERSION="${{ steps.version.outputs.version }}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Cache fpm gem
        uses: actions/cache@v5
        with:
          path: ~/.local/share/gem
          key: gem-fpm-ubuntu-24.04-2.2.1
          restore-keys: gem-fpm-ubuntu-24.04-

      - name: Install fpm
        run: |
          echo "GEM_HOME=$HOME/.local/share/gem" >> "$GITHUB_ENV"
          echo "$HOME/.local/share/gem/bin" >> "$GITHUB_PATH"
          GEM_HOME="$HOME/.local/share/gem" gem install fpm --no-document

      - name: Install appimagetool
        run: |
          curl -Lo /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/latest/download/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool
          # appimagetool is itself an AppImage; extract it so it runs without FUSE in CI
          /usr/local/bin/appimagetool --appimage-extract
          mv squashfs-root /usr/local/lib/appimagetool-extracted
          ln -sf /usr/local/lib/appimagetool-extracted/AppRun /usr/local/bin/appimagetool

      - name: Build packages (deb + rpm + pacman + appimage)
        run: ./build-package.sh --deb --rpm --pacman --appimage

      - name: Generate checksums
        run: cd dist && sha256sum * > SHA256SUMS && cat SHA256SUMS

      - name: Upload packages artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-packages
          path: dist/
          retention-days: 7

  # ── Runtime tests — gate the release on all three distros passing ────────────
  test:
    name: Runtime Test (${{ matrix.label }})
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-24.04
            flag: --test-deb
            image: ubuntu:24.04
          - label: fedora-40
            flag: --test-rpm
            image: fedora:40
          - label: arch
            flag: --test-pacman
            image: archlinux@sha256:a9a1e6db522cf5f8018c920d035e2bfbf8e39c485ee737ce0388990898f2f042
    steps:
      - uses: actions/checkout@v6

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: release-packages
          path: dist/

      - name: Pull Docker image (with retry)
        run: |
          for i in 1 2 3; do
            docker pull ${{ matrix.image }} && break
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

      - name: Runtime test (${{ matrix.label }})
        run: ./build-package.sh ${{ matrix.flag }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshot-${{ matrix.label }}
          path: test-screenshots/
          if-no-files-found: warn
          retention-days: 30

  # ── Publish — only runs when all runtime tests pass ──────────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-24.04
    needs: [build, test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: release-packages
          path: dist/

      - name: Install git-cliff
        run: |
          curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.13.1/git-cliff-2.13.1-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --strip-components=1 -C /usr/local/bin git-cliff-2.13.1-x86_64-unknown-linux-musl/git-cliff
          git-cliff --version

      - name: Generate release notes
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          git-cliff --tag "v${VERSION}" --unreleased --strip all \
            > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "Nexus Open v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            dist/*.tar.gz dist/*.deb dist/*.rpm dist/*.pkg.tar.zst dist/*.AppImage dist/SHA256SUMS
