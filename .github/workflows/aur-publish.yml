name: Publish to AUR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish to AUR (e.g. v0.2.0)'
        required: true

jobs:
  aur:
    name: Update AUR package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version and tarball URL
        id: meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          TAG="${DISPATCH_TAG:-$RELEASE_TAG}"
          VERSION="${TAG#v}"
          TARBALL_URL="https://github.com/mantonx/nexus-open/releases/download/${TAG}/nexus-open-${VERSION}-linux-amd64.tar.gz"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tarball_url=$TARBALL_URL" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 of release tarball
        id: sha256
        env:
          TARBALL_URL: ${{ steps.meta.outputs.tarball_url }}
        run: |
          SHA=$(curl -fsSL "$TARBALL_URL" | sha256sum | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD and .SRCINFO
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          # Validate formats before using in shell — versions are semver-ish,
          # sha256 is strictly hex. Both are derived from our own release, but
          # an injected value here would write a bad PKGBUILD to AUR.
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([._-][a-zA-Z0-9]+)*$ ]] \
            || { echo "Invalid VERSION: $VERSION"; exit 1; }
          [[ "$SHA256" =~ ^[0-9a-f]{64}$ ]] \
            || { echo "Invalid SHA256: $SHA256"; exit 1; }

          cd packaging/arch
          # Use | as delimiter — safe since neither value can contain it.
          sed -i "s|^pkgver=.*|pkgver=${VERSION}|" PKGBUILD
          sed -i "s|^pkgrel=.*|pkgrel=1|" PKGBUILD
          sed -i "s|^sha256sums=.*|sha256sums=('${SHA256}')|" PKGBUILD
          # Regenerate .SRCINFO from the updated PKGBUILD
          docker run --rm \
            -v "$PWD:/pkg" \
            -w /pkg \
            archlinux:latest bash -c "
              pacman -Sy --noconfirm --quiet base-devel 2>/dev/null | tail -1
              useradd -m builder
              chown -R builder /pkg
              su builder -c 'makepkg --printsrcinfo > .SRCINFO'
            "

      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # Configure SSH
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking no
          EOF

          # Clone, update, push
          git clone ssh://aur@aur.archlinux.org/nexus-open.git /tmp/aur-nexus-open
          cp packaging/arch/PKGBUILD /tmp/aur-nexus-open/PKGBUILD
          cp packaging/arch/.SRCINFO /tmp/aur-nexus-open/.SRCINFO
          cd /tmp/aur-nexus-open
          git config user.name "mantonx"
          git config user.email "matthew.panton@gmail.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to v${VERSION}"
          git push
