name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
          NEXUS_MOCK_DEVICE: "1"
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | grep total:

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Build
        run: CGO_ENABLED=1 go build ./cmd/nexus-open
