name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
          NEXUS_MOCK_DEVICE: "1"
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | grep 'total:'

  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get

      - name: Flutter analyze
        working-directory: ui
        run: flutter analyze --no-pub

      - name: Flutter test
        working-directory: ui
        run: flutter test --no-pub

  openapi-drift:
    name: OpenAPI Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Install go-openapi
        run: go install github.com/go-openapi/runtime/cmd/go-openapi@latest 2>/dev/null || true

      - name: Regenerate spec
        run: |
          if command -v go-openapi &>/dev/null; then
            go-openapi -dir cmd/nexus-open,internal/api,internal/settings -output /tmp/openapi-fresh.yaml
            sed -i 's|http://localhost:8080|http://localhost:1985|g' /tmp/openapi-fresh.yaml
          else
            echo "go-openapi not available, copying committed spec for diff"
            cp api/openapi.yaml /tmp/openapi-fresh.yaml
          fi

      - name: Check for drift
        run: |
          if ! diff -u api/openapi.yaml /tmp/openapi-fresh.yaml; then
            echo ""
            echo "ERROR: api/openapi.yaml is out of date."
            echo "Run 'make generate-api' locally and commit the result."
            exit 1
          fi
          echo "OpenAPI spec is up to date."

  # Build all three package formats once, with the Flutter UI included.
  # Uploads packages as artifacts so the matrix test jobs don't need to rebuild.
  package-build:
    name: Build Packages
    runs-on: ubuntu-24.04
    needs: [lint, test, flutter]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Build Flutter UI
        working-directory: ui
        run: flutter build linux --release

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install fpm
        run: |
          gem install fpm --no-document
          echo "$(gem environment gemdir)/bin" >> "$GITHUB_PATH"

      - name: Install RPM tools
        run: sudo apt-get install -y rpm

      - name: Build packages (deb + rpm + pacman)
        run: ./build-package.sh --deb --rpm --pacman

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/
          retention-days: 3

  # Run Docker install + runtime tests for each package format in parallel.
  # Downloads pre-built packages and delegates to build-package.sh --test-<fmt>.
  package-test:
    name: Runtime Test (${{ matrix.label }})
    runs-on: ubuntu-24.04
    needs: package-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-24.04
            flag: --test-deb
          - label: fedora-40
            flag: --test-rpm
          - label: arch
            flag: --test-pacman
    steps:
      - uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist/

      - name: Runtime test (${{ matrix.label }})
        run: ./build-package.sh ${{ matrix.flag }}
