name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
          NEXUS_MOCK_DEVICE: "1"
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | grep total:

  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get

      - name: Flutter analyze
        working-directory: ui
        run: flutter analyze --no-pub

      - name: Flutter test
        working-directory: ui
        run: flutter test --no-pub

  openapi-drift:
    name: OpenAPI Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Install go-openapi
        run: go install github.com/go-openapi/runtime/cmd/go-openapi@latest 2>/dev/null || true

      - name: Regenerate spec
        run: |
          if command -v go-openapi &>/dev/null; then
            go-openapi -dir cmd/nexus-open,internal/api,internal/settings -output /tmp/openapi-fresh.yaml
            sed -i 's|http://localhost:8080|http://localhost:1985|g' /tmp/openapi-fresh.yaml
          else
            echo "go-openapi not available, copying committed spec for diff"
            cp api/openapi.yaml /tmp/openapi-fresh.yaml
          fi

      - name: Check for drift
        run: |
          if ! diff -u api/openapi.yaml /tmp/openapi-fresh.yaml; then
            echo ""
            echo "ERROR: api/openapi.yaml is out of date."
            echo "Run 'make generate-api' locally and commit the result."
            exit 1
          fi
          echo "OpenAPI spec is up to date."

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Build
        run: CGO_ENABLED=1 go build ./cmd/nexus-open
