name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Detect which parts of the repo changed so expensive jobs can be skipped.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      flutter: ${{ steps.filter.outputs.flutter }}
      packaging: ${{ steps.filter.outputs.packaging }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            flutter:
              - 'ui/**'
            packaging:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'ui/**'
              - 'build-package.sh'
              - 'packaging/**'
              - 'configs/**'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-go-deps-v1
          restore-keys: apt-${{ runner.os }}-go-deps-

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-go-deps-v1
          restore-keys: apt-${{ runner.os }}-go-deps-

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
          NEXUS_MOCK_DEVICE: "1"
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | grep 'total:'

  flutter:
    name: Flutter
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-ubuntu-24.04-${{ hashFiles('ui/pubspec.lock') }}
          restore-keys: pub-ubuntu-24.04-

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get

      - name: Cache build_runner output
        uses: actions/cache@v4
        with:
          path: ui/.dart_tool/build
          key: build-runner-ubuntu-24.04-${{ hashFiles('ui/pubspec.lock', 'ui/lib/**/*.dart') }}
          restore-keys: build-runner-ubuntu-24.04-

      - name: Generate code (freezed / json_serializable)
        working-directory: ui
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        working-directory: ui
        run: flutter analyze --no-pub --no-fatal-infos

      - name: Flutter test
        working-directory: ui
        run: flutter test --no-pub

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu-24.04-flutter-build-v1
          restore-keys: apt-ubuntu-24.04-flutter-build-

      - name: Install Flutter Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Build Flutter UI
        run: |
          VERSION=$(git describe --tags --match 'v*' --always --dirty 2>/dev/null | sed 's/^v//' || echo "0.0.0-dev")
          cd ui && flutter build linux --release --dart-define=APP_VERSION="$VERSION"

      - name: Upload Flutter bundle
        uses: actions/upload-artifact@v4
        with:
          name: flutter-bundle
          path: ui/build/linux/x64/release/bundle/
          retention-days: 1

  openapi-drift:
    name: OpenAPI Drift
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-go-deps-v1
          restore-keys: apt-${{ runner.os }}-go-deps-

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Cache go-openapi binary
        uses: actions/cache@v4
        with:
          path: ~/go/bin/go-openapi
          key: go-openapi-v0.32.3-${{ runner.os }}

      - name: Install go-openapi
        run: |
          if [ ! -x "$HOME/go/bin/go-openapi" ]; then
            go install github.com/go-openapi/runtime/cmd/go-openapi@v0.32.3 2>/dev/null || true
          fi

      - name: Regenerate spec
        run: |
          if command -v go-openapi &>/dev/null; then
            go-openapi -dir cmd/nexus-open,internal/api,internal/settings -output /tmp/openapi-fresh.yaml
            sed -i 's|http://localhost:8080|http://localhost:1985|g' /tmp/openapi-fresh.yaml
          else
            echo "go-openapi not available, copying committed spec for diff"
            cp api/openapi.yaml /tmp/openapi-fresh.yaml
          fi

      - name: Check for drift
        run: |
          if ! diff -u api/openapi.yaml /tmp/openapi-fresh.yaml; then
            echo ""
            echo "ERROR: api/openapi.yaml is out of date."
            echo "Run 'make generate-api' locally and commit the result."
            exit 1
          fi
          echo "OpenAPI spec is up to date."

  # Build all three package formats once, with the Flutter UI included.
  # Skipped when only docs/workflow files change — needs packaging filter.
  # Uploads packages as artifacts so the matrix test jobs don't need to rebuild.
  package-build:
    name: Build Packages
    runs-on: ubuntu-24.04
    needs: [changes, lint, test, flutter]
    if: |
      always() &&
      needs.changes.outputs.packaging == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter bundle
        # Only download when the flutter job actually ran and produced an artifact.
        # When only Go files changed, flutter job is skipped — build-package.sh
        # uses the pre-built bundle from a previous run via the Flutter build cache below.
        if: needs.flutter.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: flutter-bundle
          path: ui/build/linux/x64/release/bundle/

      - name: Set up Flutter (fallback when flutter job was skipped)
        if: needs.flutter.result == 'skipped'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub dependencies (fallback)
        if: needs.flutter.result == 'skipped'
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-ubuntu-24.04-${{ hashFiles('ui/pubspec.lock') }}
          restore-keys: pub-ubuntu-24.04-

      - name: Cache build_runner output (fallback)
        if: needs.flutter.result == 'skipped'
        uses: actions/cache@v4
        with:
          path: ui/.dart_tool/build
          key: build-runner-ubuntu-24.04-${{ hashFiles('ui/pubspec.lock', 'ui/lib/**/*.dart') }}
          restore-keys: build-runner-ubuntu-24.04-

      - name: Install Flutter Linux build dependencies (fallback)
        if: needs.flutter.result == 'skipped'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev

      - name: Build Flutter UI (fallback)
        if: needs.flutter.result == 'skipped'
        run: |
          VERSION=$(git describe --tags --match 'v*' --always --dirty 2>/dev/null | sed 's/^v//' || echo "0.0.0-dev")
          cd ui && dart run build_runner build --delete-conflicting-outputs
          flutter build linux --release --dart-define=APP_VERSION="$VERSION"

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ubuntu-24.04-pkg-build-v1
          restore-keys: apt-ubuntu-24.04-pkg-build-

      - name: Install packaging dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libusb-1.0-0-dev libudev-dev libayatana-appindicator3-dev \
            rpm libarchive-tools

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Cache fpm gem
        uses: actions/cache@v4
        with:
          path: ~/.local/share/gem
          key: gem-fpm-ubuntu-24.04-2.2.1
          restore-keys: gem-fpm-ubuntu-24.04-

      - name: Install fpm
        run: |
          echo "GEM_HOME=$HOME/.local/share/gem" >> "$GITHUB_ENV"
          echo "$HOME/.local/share/gem/bin" >> "$GITHUB_PATH"
          GEM_HOME="$HOME/.local/share/gem" gem install fpm --no-document

      - name: Build packages (deb + rpm + pacman)
        run: ./build-package.sh --deb --rpm --pacman

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/
          retention-days: 3

  # Run Docker install + runtime tests for each package format in parallel.
  # Downloads pre-built packages and delegates to build-package.sh --test-<fmt>.
  package-test:
    name: Runtime Test (${{ matrix.label }})
    runs-on: ubuntu-24.04
    needs: package-build
    if: always() && needs.package-build.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-24.04
            flag: --test-deb
          - label: fedora-40
            flag: --test-rpm
          - label: arch
            flag: --test-pacman
    steps:
      - uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist/

      - name: Runtime test (${{ matrix.label }})
        run: ./build-package.sh ${{ matrix.flag }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ matrix.label }}
          path: test-screenshots/
          if-no-files-found: warn
          retention-days: 7
