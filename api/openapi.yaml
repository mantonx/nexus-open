openapi: 3.0.3
info:
  title: Nexus Open API
  version: 2.0.0
  description: API for Nexus Open - iCUE Nexus companion app
  contact:
    name: Nexus Team
    url: https://github.com/mantonx/nexus-next
  license:
    name: MIT

servers:
  - url: http://localhost:1985
    description: Local development server

tags:
  - name: system
    description: System health and status
  - name: config
    description: Configuration management
  - name: device
    description: Device control and information
  - name: window
    description: Settings window control

paths:
  /api/health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns the health status of the API server
      tags:
        - system
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 2.0.0

  /api/config:
    get:
      operationId: getConfig
      summary: Get configuration
      description: Returns the current application configuration
      tags:
        - config
      responses:
        '200':
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      operationId: updateConfig
      summary: Update configuration
      description: Updates the application configuration
      tags:
        - config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Config'
      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to save configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/device/brightness:
    post:
      operationId: setBrightness
      summary: Set display brightness
      description: Sets the brightness of the device display (0-100)
      tags:
        - device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - brightness
              properties:
                brightness:
                  type: integer
                  minimum: 0
                  maximum: 100
                  example: 80
                  description: Brightness level (0-100)
      responses:
        '200':
          description: Brightness updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      brightness:
                        type: integer
                        example: 80
        '400':
          description: Invalid brightness value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Device not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/device/info:
    get:
      operationId: getDeviceInfo
      summary: Get device information
      description: Returns information about the connected iCUE Nexus device
      tags:
        - device
      responses:
        '200':
          description: Device information
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          firmware:
                            type: string
                            example: "1.0.0"
                          vendorId:
                            type: string
                            example: "0x1b1c"
                          productId:
                            type: string
                            example: "0x1b8e"
                          model:
                            type: string
                            example: "iCUE Nexus"
        '503':
          description: Device not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/window/state:
    get:
      operationId: getWindowState
      summary: Get window state
      description: Returns the current state of the settings window
      tags:
        - window
      responses:
        '200':
          description: Current window state
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                    enum: [shown, hidden]
                    example: shown

  /api/window/show:
    post:
      operationId: showWindow
      summary: Show settings window
      description: Sends a command to show the settings window
      tags:
        - window
      responses:
        '200':
          description: Window show command sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      state:
                        type: string
                        example: shown

  /api/window/hide:
    post:
      operationId: hideWindow
      summary: Hide settings window
      description: Sends a command to hide the settings window
      tags:
        - window
      responses:
        '200':
          description: Window hide command sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      state:
                        type: string
                        example: hidden

components:
  schemas:
    Config:
      type: object
      properties:
        location:
          type: string
          example: "Jersey City, NJ"
          description: Location for weather information
        unit:
          type: string
          enum: [metric, imperial]
          example: imperial
          description: Temperature unit
        brightness:
          type: integer
          minimum: 0
          maximum: 100
          example: 80
          description: Display brightness (0-100)
        backgroundColor:
          type: string
          example: "#000000"
          description: Background color
        clockFormat:
          type: string
          enum: ["12", "24"]
          example: "12"
          description: Clock format (12 or 24 hour)
        display:
          $ref: '#/components/schemas/DisplayConfig'

    DisplayConfig:
      type: object
      properties:
        autoRotate:
          type: boolean
          example: true
        rotateIntervalSeconds:
          type: integer
          example: 30

    Success:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Operation completed successfully

    Error:
      type: object
      properties:
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Invalid input
