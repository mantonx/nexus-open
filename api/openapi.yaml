openapi: 3.1.0
components:
    schemas:
        BrightnessRequest:
            properties:
                brightness:
                    type: number
                    format: int
                    description: Brightness level (0-100)
                    example: "75"
        Config:
            properties:
                background_color:
                    type: string
                    description: Background color in hex format
                    example: '#000000'
                background_image:
                    type: string
                    description: Background image filename
                    example: background.png
                display:
                    $ref: '#/components/schemas/Display'
                image_paths:
                    type: array
                    description: List of custom image paths
                    items:
                        type: string
                text_color:
                    type: string
                    description: Text color in hex format
                    example: '#FFFFFF'
        DisplayConfig:
            properties:
                date_format:
                    type: string
                    description: Date format string (e.g. MM/DD/YYYY, DD/MM/YYYY, YYYY-MM-DD)
                    example: MM/DD/YYYY
                font_family:
                    type: string
                    description: Font family name
                    example: GoRegular
                font_size:
                    type: number
                    format: float64
                    description: Base font size in points
                    example: "11.0"
                layout:
                    type: string
                    description: Layout style (dashboard, minimalist, compact, balanced)
                    enum:
                        - dashboard minimalist compact balanced
                    example: dashboard
                time_font_size:
                    type: number
                    format: float64
                    description: Time display font size in points
                    example: "14.0"
        ErrorResponse:
            properties:
                error:
                    type: string
                    description: The error type/category
                    example: Bad Request
                message:
                    type: string
                    description: Detailed error message
                    example: Invalid brightness value provided
        SuccessResponse:
            properties:
                data: {}
                message:
                    type: string
                    description: Human-readable success message
                    example: Configuration updated successfully
                status:
                    type: string
                    description: Status of the operation
                    example: success
info:
    title: Nexus Open API
    description: |
        REST API for Nexus Open - an open-source iCUE Nexus companion app.
        Provides endpoints for device control, configuration management, and zone/module interactions.
    contact:
        name: Team
        url: https://github.com/mantonx/nexus-next
    version: 2.0.0
paths:
    /api/config:
        get:
            tags:
                - Config
            summary: Get current configuration
            description: Returns the current application configuration including display settings, location, and modules
            operationId: getConfig
            requestBody:
                content:
                    '*/*': {}
            responses:
                "200":
                    description: Configuration retrieved successfully
                    content:
                        application/json:
                            schema:
                                properties:
                                    background_color:
                                        type: string
                                        description: Background color in hex format
                                        example: '#000000'
                                    background_image:
                                        type: string
                                        description: Background image filename
                                        example: background.png
                                    display:
                                        $ref: '#/components/schemas/Display'
                                    image_paths:
                                        type: array
                                        description: List of custom image paths
                                        items:
                                            type: string
                                    text_color:
                                        type: string
                                        description: Text color in hex format
                                        example: '#FFFFFF'
                "500":
                    description: Internal server error
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        type: string
                                        description: The error type/category
                                        example: Bad Request
                                    message:
                                        type: string
                                        description: Detailed error message
                                        example: Invalid brightness value provided
        post:
            tags:
                - Config
            summary: Update configuration
            description: Updates the application configuration with new settings
            operationId: updateConfig
            parameters:
                - name: config
                  in: body
                  description: Configuration object to update
                  required: true
                  schema:
                    type: Config
            requestBody:
                content:
                    application/json: {}
            responses:
                "200":
                    description: Configuration updated successfully
                    content:
                        application/json:
                            schema:
                                properties:
                                    data: {}
                                    message:
                                        type: string
                                        description: Human-readable success message
                                        example: Configuration updated successfully
                                    status:
                                        type: string
                                        description: Status of the operation
                                        example: success
                "400":
                    description: Invalid configuration provided
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        type: string
                                        description: The error type/category
                                        example: Bad Request
                                    message:
                                        type: string
                                        description: Detailed error message
                                        example: Invalid brightness value provided
                "500":
                    description: Failed to save configuration
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        type: string
                                        description: The error type/category
                                        example: Bad Request
                                    message:
                                        type: string
                                        description: Detailed error message
                                        example: Invalid brightness value provided
    /api/device/brightness:
        post:
            tags:
                - Device
            summary: Set display brightness
            description: Sets the brightness of the iCUE Nexus device display (0-100)
            operationId: setBrightness
            parameters:
                - name: brightness
                  in: body
                  description: Brightness level to set
                  required: true
                  schema:
                    type: BrightnessRequest
            requestBody:
                content:
                    application/json: {}
            responses:
                "200":
                    description: Brightness updated successfully
                    content:
                        application/json:
                            schema:
                                properties:
                                    data: {}
                                    message:
                                        type: string
                                        description: Human-readable success message
                                        example: Configuration updated successfully
                                    status:
                                        type: string
                                        description: Status of the operation
                                        example: success
                "400":
                    description: Invalid brightness value
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        type: string
                                        description: The error type/category
                                        example: Bad Request
                                    message:
                                        type: string
                                        description: Detailed error message
                                        example: Invalid brightness value provided
                "503":
                    description: Device not available
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        type: string
                                        description: The error type/category
                                        example: Bad Request
                                    message:
                                        type: string
                                        description: Detailed error message
                                        example: Invalid brightness value provided
    /api/device/info:
        get:
            tags:
                - Device
            summary: Get device information
            description: Returns information about the connected iCUE Nexus device including firmware version and hardware details
            operationId: getDeviceInfo
            requestBody:
                content:
                    '*/*': {}
            responses:
                "200":
                    description: Device information retrieved successfully
                    content:
                        application/json:
                            schema:
                                properties:
                                    data: {}
                                    message:
                                        type: string
                                        description: Human-readable success message
                                        example: Configuration updated successfully
                                    status:
                                        type: string
                                        description: Status of the operation
                                        example: success
                "503":
                    description: Device not available
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        type: string
                                        description: The error type/category
                                        example: Bad Request
                                    message:
                                        type: string
                                        description: Detailed error message
                                        example: Invalid brightness value provided
    /api/health:
        get:
            tags:
                - Device
            summary: Health check endpoint
            description: Returns the health status of the API server including version information
            operationId: getHealth
            requestBody:
                content:
                    '*/*': {}
            responses:
                "200":
                    description: Health status retrieved successfully
                    content:
                        application/json:
                            schema:
                                properties:
                                    data: {}
                                    message:
                                        type: string
                                        description: Human-readable success message
                                        example: Configuration updated successfully
                                    status:
                                        type: string
                                        description: Status of the operation
                                        example: success
servers:
    - url: http://localhost:1985
tags:
    - name: Device
      description: Device control and status
    - name: Config
      description: Configuration management
    - name: Zone
      description: Zone and module management
    - name: Animation
      description: Animation control
